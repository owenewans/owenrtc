name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-olcrtc:
    name: build olcrtc ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: windows
            arch: amd64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
        if: matrix.arch == 'arm64'

      - name: build olcrtc
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          cd olcrtc
          go build -trimpath -ldflags="-s -w" -o ../olcrtc-${{ matrix.os }}-${{ matrix.arch }} ./cmd/olcrtc

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: olcrtc-${{ matrix.os }}-${{ matrix.arch }}
          path: olcrtc-${{ matrix.os }}-${{ matrix.arch }}
          if-no-files-found: error

  build-owenrtc:
    name: build owenrtc
    runs-on: ubuntu-latest
    needs: build-olcrtc
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: build owenrtc
        env:
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o owenrtc-linux-amd64 ./cmd/owenrtc

      - name: download all olcrtc artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: olcrtc-*

      - name: list artifacts
        run: find artifacts -type f

      - name: create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            owenrtc-linux-amd64
            artifacts/*/olcrtc-*
          generate_release_notes: true
          fail_on_unmatched_files: true
